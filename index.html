<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TOEIC Practice Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="測驗資訊">
        <div>
          <p class="eyebrow">TOEIC Practice Lab</p>
          <h1>TOEIC 自動出題、批改與裝置紀錄</h1>
        </div>
        <div class="score-strip" aria-live="polite">
          <div>
            <span class="score-label">答對</span>
            <strong id="correctCount">0</strong>
          </div>
          <div>
            <span class="score-label">完成</span>
            <strong id="progressCount">0/0</strong>
          </div>
          <div>
            <span class="score-label">時間</span>
            <strong id="timer">--:--</strong>
          </div>
        </div>
      </section>

      <section class="setup-panel" id="setupPanel">
        <div class="field">
          <label for="userName">使用者</label>
          <div class="inline-field">
            <select id="userName"></select>
            <button id="addUserBtn" type="button" title="新增使用者">＋</button>
          </div>
        </div>
        <div class="field">
          <label for="mode">模式</label>
          <select id="mode">
            <option value="practice">練習：每題立即批改</option>
            <option value="exam">模擬：全部作答後批改</option>
          </select>
        </div>
        <div class="field">
          <label for="questionCount">題數</label>
          <select id="questionCount">
            <option value="10">10 題</option>
            <option value="20">20 題</option>
            <option value="40">40 題</option>
            <option value="60">60 題</option>
          </select>
        </div>
        <div class="field">
          <label for="focus">出題範圍</label>
          <select id="focus">
            <option value="mixed">混合題型</option>
            <option value="vocabulary">語彙</option>
            <option value="grammar">文法</option>
            <option value="reading">閱讀理解</option>
            <option value="listening">聽力理解</option>
          </select>
        </div>
        <div class="field">
          <label for="level">證書顏色等級</label>
          <select id="level">
            <option value="all">全部等級</option>
            <option value="orange">Orange 入門</option>
            <option value="brown">Brown 基礎</option>
            <option value="green">Green 進階基礎</option>
            <option value="blue">Blue 中高階</option>
            <option value="gold">Gold 高階</option>
          </select>
        </div>
        <button class="primary" id="startBtn" type="button">開始測驗</button>
      </section>

      <section class="workspace">
        <aside class="question-nav" aria-label="題目列表">
          <div class="nav-title">題目</div>
          <div class="nav-grid" id="questionNav"></div>
        </aside>

        <section class="test-card" id="testCard">
          <div class="empty-state" id="emptyState">
            <div class="photo-panel" role="img" aria-label="商務辦公室與文件檢查情境"></div>
            <div>
              <h2>選擇等級後開始</h2>
              <p>題庫已擴充為固定題加模板題。每題會標示 TOEIC 題型常見度、核心單字常見度，紀錄會保存在目前這台裝置。</p>
            </div>
          </div>

          <article class="question-view hidden" id="questionView">
            <header class="question-header">
              <div>
                <p class="part-label" id="partLabel"></p>
                <h2 id="questionTitle"></h2>
                <div class="badges" id="badges"></div>
              </div>
              <span class="difficulty" id="difficulty"></span>
            </header>

            <div class="prompt" id="prompt"></div>
            <div class="choices" id="choices"></div>
            <div class="feedback hidden" id="feedback"></div>

            <footer class="controls">
              <button id="prevBtn" type="button">上一題</button>
              <button id="checkBtn" class="secondary" type="button">批改本題</button>
              <button id="nextBtn" class="primary" type="button">下一題</button>
              <button id="finishBtn" class="primary hidden" type="button">交卷批改</button>
            </footer>
          </article>
        </section>

        <aside class="insights">
          <div class="panel">
            <h2>即時分析</h2>
            <div class="metric">
              <span>正確率</span>
              <strong id="accuracy">0%</strong>
            </div>
            <div class="bar"><span id="accuracyBar"></span></div>
            <div class="metric">
              <span>預估總分色階</span>
              <strong id="estimate">--</strong>
            </div>
            <p class="note" id="levelNote">色階依常見 TOEIC L&R 證書分數區間估算。</p>
          </div>

          <div class="panel">
            <h2>題型弱點</h2>
            <ul class="weakness-list" id="weaknessList">
              <li>開始測驗後會顯示統計。</li>
            </ul>
          </div>

          <div class="panel">
            <h2>錯題回顧</h2>
            <div class="review-list" id="reviewList">尚無錯題。</div>
          </div>

          <div class="panel">
            <h2>本機紀錄</h2>
            <div class="history-list" id="historyList">這位使用者尚無紀錄。</div>
          </div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
